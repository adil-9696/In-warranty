name: Postman Collection
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '18'
          
      - name: Install newman
        run: | 
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run collection
        run: |
          newman run "In Warranty flw.postman_collection.json" -e "QA env.postman_environment.json" -r cli,htmlextra
