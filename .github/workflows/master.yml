name: Postman Collection
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    -cron: '30 02 * * *'
jobs:
  run-postman-tests:
  runs-on: Ubuntu-latest
  steps:
    - name: checkout the code
     uses: actions/checkout@v7.0.0

    - name: Setup node
      uses: actions/setup-node@v6.4.0
      with:
          node-version: '18'
          
    - name: install newman
      run: | 
          npm install -g newman
          npm install -g newman-reporter-htmlextra

     - name: run collection
       run: |
         newman run 'In Warranty flw.postman_collection.json'\-e 'QA env.postman_environment.json'\-r cli,htmlextra
         
              
  
    
