name: Postman Collection
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install newman
        run: | 
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run collection
        run: |
          newman run "In Warranty flw.postman_collection.json" -e "QA env.postman_environment.json" -r cli,htmlextra --reporter-htmlextra-export ./newman/index.html       
      - name: Newwman HTML report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newwman-REPORT
          path: newman/*.html
      - name: Creating GIThub branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/
        
     
